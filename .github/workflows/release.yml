name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: robinpath-windows-x64.exe
            target: bun-windows-x64
          - os: ubuntu-latest
            name: robinpath-linux-x64
            target: bun-linux-x64
          - os: macos-latest
            name: robinpath-macos-arm64
            target: bun-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build standalone binary
        run: bun build src/index.ts --compile --outfile=dist/${{ matrix.name }} --target=${{ matrix.target }}

      - name: Verify binary
        shell: bash
        run: |
          ./dist/${{ matrix.name }} --version

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "dist/${{ matrix.name }}" --clobber
